</style></head><body><div class="header"><div class="header-text"><div class="kicker">MET TERM · 氣象術語整理</div><h1>氣象辭典<br><span style="font-size:26px;font-weight:500;color:#f2d2b1;letter-spacing:.04em">青絲白髮一瞬間，年華老去向誰言</span></h1><div class="sub">本網頁內容為實驗性質，網頁整體風格為科技文青溫暖風格。</div></div><div class="header-art"><img src="../cloud_claw.png" alt="cloud claw"></div></div><div class="wrap"><div class="card"><div class="hero-band"></div><div class="letter-nav"><a href="../index.html">首頁</a><a href="../all.html">全部</a><a class="" href="a.html">A</a><a class="" href="b.html">B</a><a class="" href="c.html">C</a><a class="" href="d.html">D</a><a class="" href="e.html">E</a><a class="" href="f.html">F</a><a class="" href="g.html">G</a><a class="active" href="h.html">H</a><a class="" href="i.html">I</a><a class="" href="j.html">J</a><a class="" href="k.html">K</a><a class="" href="l.html">L</a><a class="" href="m.html">M</a><a class="" href="n.html">N</a><a class="" href="o.html">O</a><a class="" href="p.html">P</a><a class="" href="q.html">Q</a><a class="" href="r.html">R</a><a class="" href="s.html">S</a><a class="" href="t.html">T</a><a class="" href="u.html">U</a><a class="" href="v.html">V</a><a class="" href="w.html">W</a><a class="" href="x.html">X</a><a class="" href="y.html">Y</a><a class="" href="z.html">Z</a></div><div class="controls"><input id="searchInput" type="text" placeholder="搜尋 H 字術語的英文、繁中或解釋"><select id="pageSize"><option value="20">每頁 20 筆</option><option value="50" selected>每頁 50 筆</option><option value="100">每頁 100 筆</option></select><button id="resetBtn">清除搜尋</button><button id="prevBtn">上一頁</button><button id="nextBtn">下一頁</button></div><div class="stats"><span class="badge">資料集：H</span><span class="badge">H 字術語總數：334</span><span class="badge" id="matchCount">載入中…</span></div><div class="table-wrap"><table><thead><tr><th>English term</th><th>繁體中文</th><th>名詞解釋</th></tr></thead><tbody id="tableBody"><tr><td colspan="3" class="loading">正在載入術語資料…</td></tr></tbody></table></div><div class="pagination"><div class="page-indicator" id="pageIndicator">第 1 頁 / 共 1 頁</div><div class="pager"><button id="firstBtn">第一頁</button><button id="lastBtn">最後一頁</button></div></div><div class="note">此頁只載入 H 字術語，因此比全站總表更快，更適合日常查閱與後續擴充到接近上萬筆資料的場景。</div></div></div><div class="footer">Built for met_term · 2026-04-29 · Editor: CEO CLAW</div><script>
let glossaryData=[]; let filtered=[]; let currentPage=1; let pageSize=50;
const body=document.getElementById("tableBody"), matchCount=document.getElementById("matchCount"), pageIndicator=document.getElementById("pageIndicator"), searchInput=document.getElementById("searchInput"), pageSizeSelect=document.getElementById("pageSize");
function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function render(){const totalPages=Math.max(1,Math.ceil(filtered.length/pageSize)); if(currentPage>totalPages) currentPage=totalPages; const start=(currentPage-1)*pageSize; const pageRows=filtered.slice(start,start+pageSize); body.innerHTML=pageRows.map(r=>`<tr><td>${escapeHtml(r.english)}</td><td>${escapeHtml(r.traditional_chinese)}</td><td>${escapeHtml(r.definition_cht)}</td></tr>`).join(''); matchCount.textContent=`目前顯示：${filtered.length} 筆`; pageIndicator.textContent=`第 ${currentPage} 頁 / 共 ${totalPages} 頁`;}
function applyFilter(){const q=searchInput.value.trim().toLowerCase(); filtered=!q?[...glossaryData]:glossaryData.filter(r=>r.english.toLowerCase().includes(q)||r.traditional_chinese.toLowerCase().includes(q)||r.definition_cht.toLowerCase().includes(q)); currentPage=1; render();}
searchInput.addEventListener('input',applyFilter); pageSizeSelect.addEventListener('change',()=>{pageSize=Number(pageSizeSelect.value); currentPage=1; render();}); document.getElementById('resetBtn').addEventListener('click',()=>{searchInput.value=''; applyFilter();}); document.getElementById('prevBtn').addEventListener('click',()=>{if(currentPage>1){currentPage--; render();}}); document.getElementById('nextBtn').addEventListener('click',()=>{const totalPages=Math.max(1,Math.ceil(filtered.length/pageSize)); if(currentPage<totalPages){currentPage++; render();}}); document.getElementById('firstBtn').addEventListener('click',()=>{currentPage=1; render();}); document.getElementById('lastBtn').addEventListener('click',()=>{currentPage=Math.max(1,Math.ceil(filtered.length/pageSize)); render();});
fetch('../data/h_terms_all_cht.json').then(r=>r.json()).then(data=>{glossaryData=data; filtered=[...glossaryData]; render();}).catch(err=>{body.innerHTML='<tr><td colspan="3" class="loading">資料載入失敗，請稍後再試。</td></tr>'; matchCount.textContent='載入失敗'; console.error(err);});
</script></body></html>
